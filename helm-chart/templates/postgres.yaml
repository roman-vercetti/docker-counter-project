apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Chart.Name }}-postgresql
spec:
  serviceName: {{ .Chart.Name }}-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Chart.Name }}-postgresql
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-postgresql
    spec:
      containers:
      - name: postgresql
        image: {{ .Values.postgresql.image }}
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: {{ .Values.postgresql.database }}
        - name: POSTGRES_USER
          value: {{ .Values.postgresql.user }}
        - name: POSTGRES_PASSWORD
          value: {{ .Values.postgresql.password }}
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: {{ .Values.postgresql.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-postgresql
spec:
  selector:
    app: {{ .Chart.Name }}-postgresql
  ports:
  - port: 5432
    targetPort: 5432
